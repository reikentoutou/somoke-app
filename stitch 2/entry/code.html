<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Inter', sans-serif; background-color: #f9f9fb; }
        .glass-header { background: rgba(249, 249, 251, 0.8); backdrop-filter: blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="text-on-surface antialiased pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-slate-50/80 dark:bg-zinc-950/80 backdrop-blur-xl flex items-center justify-between px-6 pt-12 pb-4 w-full">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="User profile placeholder avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDNL_qypLupmhIXwNJaLbBxpk6NNK_rA0YM6cnOcewnXyaMxN0GRW4P44JMNPgmn7TL7nYRToyfRSdkTzKeIC9wfyQ29Pn3XwO5j2PyLTOgVnOiuMWUx3chUf5mI4O4g1VXt030oabtEYhvN3ymjmNUXditU3k5OTml4i9_Ez7TEcjFrHBhlMkttGm5HttIKPdgjmYEH5Relkjz8R-eEW8nxmwWOqGWr_AkBkbtzj4ZeN2apehG5ahgtlV6fPrsmQVrc79rvaM90C4"/>
</div>
<h1 class="text-black dark:text-white font-['Inter'] font-semibold text-3xl tracking-tight">Ledger</h1>
</div>
<button class="text-black dark:text-white hover:opacity-70 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined">search</span>
</button>
</header>
<main class="pt-32 px-6 max-w-2xl mx-auto">
<!-- Editorial Headline -->
<div class="mb-12">
<span class="text-[0.6875rem] font-bold uppercase tracking-widest text-on-surface-variant mb-2 block">新增条目</span>
<h2 class="text-[2rem] font-semibold leading-tight text-primary">新增记账数据</h2>
</div>
<form class="space-y-10">
<!-- Section: Primary Info (Asymmetric Bento Style) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="bg-surface-container-lowest p-6 rounded-xl border border-black/[0.03] flex flex-col justify-between">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-secondary mb-4 block">日期</label>
<input class="w-full bg-transparent border-none p-0 text-xl font-medium focus:ring-0" type="date" value="2023-10-27"/>
</div>
<div class="bg-surface-container-lowest p-6 rounded-xl border border-black/[0.03] flex flex-col justify-between">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-secondary mb-4 block">所属班次</label>
<select class="w-full bg-transparent border-none p-0 text-xl font-medium focus:ring-0 appearance-none">
<option>早班</option>
<option>中班</option>
<option>晚班</option>
</select>
</div>
</div>
<!-- Full Width Input: Name -->
<div class="relative group">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-secondary mb-2 block transition-colors group-focus-within:text-primary">记账姓名</label>
<input class="w-full bg-transparent border-b border-outline-variant py-4 text-2xl font-semibold focus:border-primary focus:ring-0 transition-all placeholder:text-surface-container-highest" placeholder="输入姓名" type="text"/>
</div>
<!-- Heavy Display Section: Shift Quantities -->
<div class="space-y-4">
<div class="bg-surface-container-low rounded-xl p-8 flex flex-col md:flex-row items-center justify-between gap-8">
<div class="w-full">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-secondary mb-2 block text-center md:text-left">上班数量</label>
<input class="w-full bg-transparent border-none p-0 text-[3.5rem] font-bold text-primary focus:ring-0 text-center md:text-left placeholder:text-surface-container-highest" placeholder="0" type="number"/>
</div>
<div class="h-px w-full md:h-16 md:w-px bg-outline-variant/30"></div>
<div class="w-full text-right">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest text-secondary mb-2 block text-center md:text-right">下班数量</label>
<input class="w-full bg-transparent border-none p-0 text-[3.5rem] font-bold text-primary focus:ring-0 text-center md:text-right placeholder:text-surface-container-highest" placeholder="0" type="number"/>
</div>
</div>
</div>
<!-- Payment Methods Grid -->
<div class="space-y-6">
<h3 class="text-[1.125rem] font-medium text-primary">支付方式统计</h3>
<div class="grid grid-cols-1 gap-4">
<div class="flex items-center justify-between bg-surface-container-lowest px-6 py-5 rounded-xl border border-black/[0.03]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary">payments</span>
<span class="font-medium">微信卖出数量</span>
</div>
<input class="w-24 bg-transparent border-none text-right font-semibold text-lg focus:ring-0" placeholder="0" type="number"/>
</div>
<div class="flex items-center justify-between bg-surface-container-lowest px-6 py-5 rounded-xl border border-black/[0.03]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary">account_balance_wallet</span>
<span class="font-medium">支付宝卖出数量</span>
</div>
<input class="w-24 bg-transparent border-none text-right font-semibold text-lg focus:ring-0" placeholder="0" type="number"/>
</div>
<div class="flex items-center justify-between bg-surface-container-lowest px-6 py-5 rounded-xl border border-black/[0.03]">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-secondary">monetization_on</span>
<span class="font-medium">现金卖出数量</span>
</div>
<input class="w-24 bg-transparent border-none text-right font-semibold text-lg focus:ring-0" placeholder="0" type="number"/>
</div>
<div class="flex items-center justify-between bg-surface-container-lowest px-6 py-5 rounded-xl border border-black/[0.03]">
<div class="flex items-center gap-4 text-error">
<span class="material-symbols-outlined">featured_seasonal_and_gifts</span>
<span class="font-medium">赠送量</span>
</div>
<input class="w-24 bg-transparent border-none text-right font-semibold text-lg focus:ring-0 text-error placeholder:text-error/30" placeholder="0" type="number"/>
</div>
</div>
</div>
<!-- Summary Card (Tonal Layering) -->
<div class="bg-primary text-on-primary p-8 rounded-xl shadow-[0_20px_40px_rgba(0,0,0,0.1)]">
<label class="text-[0.6875rem] font-bold uppercase tracking-widest opacity-60 mb-6 block">结果预估报告</label>
<div class="space-y-6">
<div class="flex justify-between items-end border-b border-white/10 pb-4">
<span class="text-sm opacity-80">总卖出数量</span>
<span class="text-3xl font-bold tracking-tight">0</span>
</div>
<div class="grid grid-cols-2 gap-8 pt-2">
<div>
<span class="text-[0.6875rem] font-bold uppercase tracking-widest opacity-60 block mb-1">上现金</span>
<span class="text-xl font-semibold">¥ 0.00</span>
</div>
<div class="text-right">
<span class="text-[0.6875rem] font-bold uppercase tracking-widest opacity-60 block mb-1">下班现金</span>
<span class="text-xl font-semibold">¥ 0.00</span>
</div>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary py-6 rounded-full font-bold text-lg hover:opacity-90 active:scale-[0.96] transition-all flex items-center justify-center gap-2" type="submit">
<span>确认提交数据</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</form>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-white/90 dark:bg-zinc-900/90 backdrop-blur-xl rounded-t-[24px] shadow-[0_-4px_40px_rgba(0,0,0,0.04)]">
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-600 hover:text-black dark:hover:text-white transition-colors active:scale-90 duration-200 cursor-pointer">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-['Inter'] mt-1">概览</span>
</div>
<div class="flex flex-col items-center justify-center text-black dark:text-white scale-110 active:scale-90 duration-200 cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-['Inter'] mt-1">录入</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-600 hover:text-black dark:hover:text-white transition-colors active:scale-90 duration-200 cursor-pointer">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-['Inter'] mt-1">报表</span>
</div>
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-600 hover:text-black dark:hover:text-white transition-colors active:scale-90 duration-200 cursor-pointer">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-widest font-['Inter'] mt-1">设置</span>
</div>
</nav>
</body></html>
